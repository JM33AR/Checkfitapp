<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - FitCheck</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #333;
            margin: 0;
            padding: 24px 16px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .logo {
            text-align: center;
            font-weight: 800;
            color: #2b6cb0;
            font-size: 1.6rem;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .logo span {
            color: #2c3e50;
        }
        h1 {
            font-size: 1.2rem;
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 1px #3182ce;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            background-color: #2b6cb0;
            color: white;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background-color: #2c5282;
        }
        .footer-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #718096;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Fit<span>Check</span></div>
    <h1>¿Sos fabricante o tenés una tienda? Sumate a la red</h1>
    
    <form action="https://formspree.io/f/mqenpvzv" method="POST">
        <div class="form-group">
            <label for="nombre">Nombre y Apellido:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
        </div>
        
        <div class="form-group">
            <label for="marca">Nombre de la Tienda o Marca:</label>
            <input type="text" id="marca" name="marca" placeholder="Ej. Mi Tienda Online" required>
        </div>
        
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="_replyto" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
            <label for="mensaje">¿Qué prendas necesitás integrar?</label>
            <textarea id="mensaje" name="mensaje" placeholder="Contanos brevemente qué vende tu tienda..." required></textarea>
        </div>
        
        <button type="submit">Enviar Solicitud</button>
    </form>
    
    <div class="footer-link">
        &copy; 2026 FitCheck. Todos los derechos reservados.
    </div>
</div>

</body>
</html>
